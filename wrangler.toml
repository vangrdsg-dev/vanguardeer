# Cloudflare config for Vanguardeer
# Pages site deploys automatically via Git (push to main → live on vanguardeer.com)
# Worker (chat + reports): npx wrangler deploy
# Set secrets:             npx wrangler secret put ANTHROPIC_API_KEY
#                          npx wrangler secret put ADMIN_SECRET

name = "vanguardeer-chat"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# vanguardeer.com/report/* → this Worker (client-facing audit reports)
routes = [
  { pattern = "vanguardeer.com/report/*", zone_name = "vanguardeer.com" }
]

[[kv_namespaces]]
binding = "AUDIT_REPORTS"
id = "9be03d56f64848268f9dc7ddd94fde6a"
