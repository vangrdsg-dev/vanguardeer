  <!-- Gold 8-pointed compass star -->
  <polygon points="50,2 53,18 64,12 58,23 72,26 58,29 64,40 53,34 50,48 47,34 36,40 42,29 28,26 42,23 36,12 47,18" fill="#C8A44D"/>
