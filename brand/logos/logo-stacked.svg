<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="Vanguardeer — Strategy. Execution. Growth.">
  <!-- Mark centered at x=100 -->
  <!-- Left V arm (shifted right by 50) -->
  <polygon points="57,8 74,8 93,78 76,78" fill="#0B1F3A"/>
  <!-- Right V arm -->
  <polygon points="143,8 126,8 107,78 124,78" fill="#0B1F3A"/>
  <!-- Gold 8-pointed compass star (centered at 100) -->
  <polygon points="100,2 103,18 114,12 108,23 122,26 108,29 114,40 103,34 100,48 97,34 86,40 92,29 78,26 92,23 86,12 97,18" fill="#C8A44D"/>
  <!-- Inner compass needle -->
  <polygon points="100,14 105,26 100,38 95,26" fill="#0B1F3A"/>
  <!-- Wordmark -->
  <text
    x="100"
    y="105"
    font-family="Montserrat, 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="22"
    letter-spacing="3"
    fill="#0B1F3A"
    text-anchor="middle"
  >VANGUARDEER</text>
  <!-- Tagline line 1 -->
  <text
    x="100"
    y="125"
    font-family="Montserrat, Arial, sans-serif"
    font-weight="600"
    font-size="10"
    letter-spacing="2"
    fill="#5B6470"
    text-anchor="middle"
  >STRATEGY. EXECUTION.</text>
  <!-- GROWTH. in gold -->
  <text
    x="100"
    y="140"
    font-family="Montserrat, Arial, sans-serif"
    font-weight="700"
    font-size="10"
    letter-spacing="2"
    fill="#C8A44D"
    text-anchor="middle"
  >GROWTH.</text>
</svg>
